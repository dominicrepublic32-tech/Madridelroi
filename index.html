<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Secretary</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080B0E; --panel:#0F1318; --panel2:#141920; --line:#1C2128;
  --text:#E8EAED; --muted:#6B7785; --faint:#3A4250;
  --green:#00D68F; --red:#FF5C5C; --yellow:#FFC23C; --blue:#5B9EF0; --purple:#A78BFA;
  --fd:'Space Grotesk',sans-serif; --fm:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:var(--fm);font-size:13px;display:flex;flex-direction:column;}

/* ── layout ── */
.app{display:flex;height:100vh;overflow:hidden;}
.sidebar{width:260px;min-width:260px;border-right:1px solid var(--line);display:flex;flex-direction:column;overflow:hidden;}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}

/* ── sidebar ── */
.sb-header{padding:18px 16px 14px;border-bottom:1px solid var(--line);}
.sb-logo{font-family:var(--fd);font-weight:700;font-size:17px;letter-spacing:.3px;display:flex;align-items:center;gap:10px;}
.sb-logo .orb{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--green),var(--blue));display:flex;align-items:center;justify-content:center;font-size:13px;}
.sb-section{padding:14px 16px;border-bottom:1px solid var(--line);}
.sb-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:10px;font-family:var(--fd);font-weight:500;}

/* account cards */
.acc-card{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:10px 12px;margin-bottom:8px;}
.acc-card:last-child{margin-bottom:0;}
.acc-row{display:flex;justify-content:space-between;align-items:center;}
.acc-name{font-size:12px;font-family:var(--fd);font-weight:600;}
.acc-dot{width:7px;height:7px;border-radius:50%;background:var(--faint);}
.acc-dot.on{background:var(--green);box-shadow:0 0 6px var(--green);}
.acc-balance{font-size:11px;color:var(--muted);margin-top:4px;}
.acc-id{font-size:10px;color:var(--faint);}

/* token inputs */
.token-field{width:100%;background:var(--panel);border:1px solid var(--line);color:var(--text);font-family:var(--fm);font-size:12px;padding:8px 10px;border-radius:6px;margin-bottom:6px;}
.token-field:focus{outline:1px solid var(--green);}
.btn-sm{font-family:var(--fd);font-weight:600;font-size:12px;padding:7px 14px;border-radius:6px;border:none;cursor:pointer;background:var(--panel2);color:var(--text);border:1px solid var(--line);}
.btn-sm.primary{background:var(--green);color:#061A10;border-color:var(--green);}
.btn-sm:disabled{opacity:.4;cursor:not-allowed;}

/* market watch */
.market-watch{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:10px 12px;}
.mw-price{font-size:22px;font-weight:700;letter-spacing:-1px;color:var(--green);}
.mw-symbol{font-size:10px;color:var(--muted);margin-bottom:4px;}
.mw-stats{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px;}
.mw-stat label{font-size:9px;color:var(--muted);display:block;}
.mw-stat span{font-size:12px;color:var(--text);}

/* mt5 status */
.mt5-badge{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--panel2);border:1px solid var(--line);border-radius:8px;font-size:12px;}
.mt5-dot{width:7px;height:7px;border-radius:50%;background:var(--faint);}
.mt5-dot.on{background:var(--blue);box-shadow:0 0 6px var(--blue);}

/* memory tools */
.mem-btns{display:flex;gap:6px;flex-wrap:wrap;}

/* sidebar scroll */
.sb-scroll{flex:1;overflow-y:auto;padding-bottom:16px;}

/* ── topbar ── */
.topbar{padding:12px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.topbar-title{font-family:var(--fd);font-weight:600;font-size:14px;color:var(--muted);}
.thinking-badge{font-size:11px;color:var(--yellow);display:flex;align-items:center;gap:6px;}
.thinking-dot{width:6px;height:6px;border-radius:50%;background:var(--yellow);animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.2;}}

/* ── chat ── */
.chat-area{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px;}

.msg{display:flex;flex-direction:column;max-width:82%;}
.msg.user{align-self:flex-end;align-items:flex-end;}
.msg.assistant{align-self:flex-start;align-items:flex-start;}
.msg-role{font-size:10px;color:var(--muted);margin-bottom:5px;font-family:var(--fd);font-weight:500;text-transform:uppercase;letter-spacing:.8px;}
.msg-bubble{padding:12px 16px;border-radius:12px;line-height:1.7;font-size:13px;white-space:pre-wrap;word-break:break-word;}
.msg.user .msg-bubble{background:rgba(0,214,143,.08);border:1px solid rgba(0,214,143,.18);border-radius:12px 12px 3px 12px;}
.msg.assistant .msg-bubble{background:var(--panel);border:1px solid var(--line);border-radius:12px 12px 12px 3px;}

/* ── action card ── */
.action-card{margin-top:12px;background:var(--panel2);border:1px solid var(--line);border-radius:10px;overflow:hidden;width:100%;max-width:440px;}
.ac-header{padding:10px 14px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;}
.ac-type{font-family:var(--fd);font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.8px;}
.ac-type.deriv{color:var(--green);}
.ac-type.mt5{color:var(--blue);}
.ac-type.info{color:var(--yellow);}
.ac-badge{font-size:10px;padding:2px 8px;border-radius:20px;font-family:var(--fd);}
.ac-badge.pending{background:rgba(255,194,60,.1);color:var(--yellow);border:1px solid rgba(255,194,60,.3);}
.ac-badge.confirmed{background:rgba(0,214,143,.1);color:var(--green);border:1px solid rgba(0,214,143,.3);}
.ac-badge.rejected{background:rgba(255,92,92,.1);color:var(--red);border:1px solid rgba(255,92,92,.3);}
.ac-rows{padding:10px 14px;}
.ac-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--line);font-size:12px;}
.ac-row:last-child{border-bottom:none;}
.ac-row label{color:var(--muted);}
.ac-row span{color:var(--text);font-weight:500;}
.ac-edit-area{padding:10px 14px;border-top:1px solid var(--line);display:none;flex-direction:column;gap:8px;}
.ac-edit-area.open{display:flex;}
.ac-edit-row{display:flex;align-items:center;gap:8px;}
.ac-edit-row label{font-size:11px;color:var(--muted);width:90px;flex-shrink:0;}
.ac-edit-row input{flex:1;background:var(--panel);border:1px solid var(--line);color:var(--text);font-family:var(--fm);font-size:12px;padding:5px 8px;border-radius:5px;}
.ac-actions{padding:10px 14px;border-top:1px solid var(--line);display:flex;gap:8px;}
.ac-btn{font-family:var(--fd);font-weight:700;font-size:12px;padding:7px 16px;border-radius:7px;border:none;cursor:pointer;}
.ac-btn.confirm{background:var(--green);color:#061A10;flex:1;}
.ac-btn.reject{background:transparent;color:var(--red);border:1px solid var(--red);}
.ac-btn.edit{background:transparent;color:var(--yellow);border:1px solid var(--faint);}
.ac-btn:disabled{opacity:.4;cursor:not-allowed;}

/* ── input area ── */
.input-area{padding:14px 20px;border-top:1px solid var(--line);flex-shrink:0;display:flex;gap:10px;}
.chat-input{flex:1;background:var(--panel);border:1px solid var(--line);color:var(--text);font-family:var(--fm);font-size:13px;padding:12px 16px;border-radius:10px;resize:none;outline:none;line-height:1.5;max-height:120px;}
.chat-input:focus{border-color:var(--green);}
.send-btn{font-family:var(--fd);font-weight:700;font-size:13px;padding:12px 20px;background:var(--green);color:#061A10;border:none;border-radius:10px;cursor:pointer;flex-shrink:0;}
.send-btn:disabled{opacity:.4;cursor:not-allowed;}

/* scrollbar */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--faint);border-radius:4px;}
</style>
</head>
<body>
<div class="app">

<!-- ── SIDEBAR ── -->
<aside class="sidebar">
  <div class="sb-header">
    <div class="sb-logo">
      <div class="orb">S</div>
      Trading Secretary
    </div>
  </div>

  <div class="sb-scroll">

    <!-- accounts -->
    <div class="sb-section">
      <div class="sb-label">Deriv Accounts</div>
      <div class="acc-card">
        <div class="acc-row">
          <span class="acc-name">Account 1</span>
          <span class="acc-dot" id="a1dot"></span>
        </div>
        <div class="acc-balance" id="a1balance">Not connected</div>
        <div class="acc-id" id="a1id"></div>
      </div>
      <div class="acc-card">
        <div class="acc-row">
          <span class="acc-name">Account 2</span>
          <span class="acc-dot" id="a2dot"></span>
        </div>
        <div class="acc-balance" id="a2balance">Not connected</div>
        <div class="acc-id" id="a2id"></div>
      </div>
      <div style="margin-top:12px;">
        <input type="password" class="token-field" id="token1" placeholder="Account 1 API token">
        <input type="password" class="token-field" id="token2" placeholder="Account 2 API token">
        <button class="btn-sm primary" id="connectBtn" onclick="connectAccounts()" style="width:100%;">Connect</button>
      </div>
    </div>

    <!-- market watch -->
    <div class="sb-section">
      <div class="sb-label">Market Watch</div>
      <div class="market-watch">
        <div class="mw-symbol" id="mwSymbol">No market selected</div>
        <div class="mw-price" id="mwPrice">—</div>
        <div class="mw-stats">
          <div class="mw-stat"><label>5-tick range</label><span id="mw5">—</span></div>
          <div class="mw-stat"><label>10-tick range</label><span id="mw10">—</span></div>
          <div class="mw-stat"><label>20-tick range</label><span id="mw20">—</span></div>
          <div class="mw-stat"><label>Ticks buffered</label><span id="mwCount">—</span></div>
        </div>
      </div>
    </div>

    <!-- MT5 -->
    <div class="sb-section">
      <div class="sb-label">MT5 Bridge</div>
      <div class="mt5-badge">
        <span class="mt5-dot" id="mt5dot"></span>
        <span id="mt5status">Waiting for EA connection</span>
      </div>
      <div style="margin-top:8px;font-size:11px;color:var(--muted);line-height:1.5;">
        Load <strong style="color:var(--text)">TradingSecretary.mq5</strong> in MT5 on your RDP. Set the server URL to your Render URL.
      </div>
    </div>

    <!-- memory -->
    <div class="sb-section">
      <div class="sb-label">Memory</div>
      <div class="mem-btns">
        <button class="btn-sm" onclick="exportMemory()">Export</button>
        <button class="btn-sm" onclick="document.getElementById('importFile').click()">Import</button>
        <button class="btn-sm" style="color:var(--red);" onclick="clearMemory()">Clear chat</button>
        <input type="file" id="importFile" accept=".json" style="display:none" onchange="importMemory(this)">
      </div>
    </div>

  </div>
</aside>

<!-- ── MAIN ── -->
<div class="main">
  <div class="topbar">
    <span class="topbar-title">AI Trading Secretary</span>
    <div class="thinking-badge" id="thinkingBadge" style="display:none;">
      <span class="thinking-dot"></span> Thinking…
    </div>
  </div>

  <div class="chat-area" id="chatArea">
    <!-- messages injected here -->
  </div>

  <div class="input-area">
    <textarea class="chat-input" id="chatInput" rows="1" placeholder="Tell me what you want to do…" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">Send</button>
  </div>
</div>

</div>

<script>
let thinking = false;
const chatArea = document.getElementById('chatArea');
const chatInput = document.getElementById('chatInput');

// ── helpers ──────────────────────────────────────────────────────────────
function el(id){ return document.getElementById(id); }

function autoResize(ta){
  ta.style.height = 'auto';
  ta.style.height = Math.min(ta.scrollHeight, 120) + 'px';
}

function scrollBottom(){ chatArea.scrollTop = chatArea.scrollHeight; }

function setThinking(v){
  thinking = v;
  el('thinkingBadge').style.display = v ? 'flex' : 'none';
  el('sendBtn').disabled = v;
}

// ── account status ────────────────────────────────────────────────────────
function updateAccountUI(accounts){
  if(!accounts) return;
  const [a1,a2] = accounts;
  el('a1dot').className = 'acc-dot' + (a1.ready?' on':'');
  el('a2dot').className = 'acc-dot' + (a2.ready?' on':'');
  el('a1balance').textContent = a1.ready ? `${a1.currency} ${Number(a1.balance||0).toFixed(2)}` : 'Not connected';
  el('a2balance').textContent = a2.ready ? `${a2.currency} ${Number(a2.balance||0).toFixed(2)}` : 'Not connected';
  el('a1id').textContent = a1.loginid || '';
  el('a2id').textContent = a2.loginid || '';
}

function updateTickUI(ticks){
  if(!ticks){ el('mwPrice').textContent='—'; return; }
  el('mwSymbol').textContent = ticks.symbol || '';
  el('mwPrice').textContent = ticks.last ? Number(ticks.last).toFixed(4) : '—';
  el('mw5').textContent = ticks.range5 ?? '—';
  el('mw10').textContent = ticks.range10 ?? '—';
  el('mw20').textContent = ticks.range20 ?? '—';
  el('mwCount').textContent = ticks.count ?? '—';
}

async function refreshStatus(){
  try{
    const d = await fetch('/api/status').then(r=>r.json());
    updateAccountUI(d.accounts);
    updateTickUI(d.ticks);
    const mt5p = d.mt5Pending;
    el('mt5dot').className = 'mt5-dot'; // EA considered connected if server is up
    el('mt5status').textContent = `Bridge ready — ${mt5p} order(s) queued`;
  } catch {}
}

// ── connect accounts ──────────────────────────────────────────────────────
async function connectAccounts(){
  const t1 = el('token1').value.trim();
  const t2 = el('token2').value.trim();
  if(!t1 && !t2){ alert('Enter at least one token'); return; }
  el('connectBtn').disabled = true;
  el('connectBtn').textContent = 'Connecting…';
  const res = await fetch('/api/tokens',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token1:t1,token2:t2})}).then(r=>r.json());
  el('token1').value=''; el('token2').value='';
  el('connectBtn').disabled=false; el('connectBtn').textContent='Connect';
  updateAccountUI(res.acc1 && res.acc2 ? [res.acc1, res.acc2] : null);
  appendMessage('assistant','Accounts connected. ' + [res.acc1,res.acc2].filter(a=>a?.ready).map(a=>`${a.name} (${a.loginid}): ${a.currency} ${Number(a.balance||0).toFixed(2)}`).join(' | '));
}

// ── chat ──────────────────────────────────────────────────────────────────
function handleKey(e){
  if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); sendMessage(); }
}

async function sendMessage(){
  const msg = chatInput.value.trim();
  if(!msg || thinking) return;
  chatInput.value=''; chatInput.style.height='auto';
  appendMessage('user', msg);
  setThinking(true);
  try{
    const res = await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg})}).then(r=>r.json());
    if(res.error){ appendMessage('assistant','Error: '+res.error); return; }
    appendMessage('assistant', res.text, res.action);
  } catch(e){ appendMessage('assistant','Connection error: '+e.message); }
  finally{ setThinking(false); }
}

function appendMessage(role, text, action){
  const wrap = document.createElement('div');
  wrap.className = `msg ${role}`;

  const roleEl = document.createElement('div');
  roleEl.className = 'msg-role';
  roleEl.textContent = role === 'user' ? 'You' : 'Secretary';
  wrap.appendChild(roleEl);

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.textContent = text;
  wrap.appendChild(bubble);

  if(action){ wrap.appendChild(buildActionCard(action)); }

  chatArea.appendChild(wrap);
  scrollBottom();
}

// ── action card ───────────────────────────────────────────────────────────
function buildActionCard(action){
  const card = document.createElement('div');
  card.className = 'action-card';
  card.id = 'card_'+action.id;

  const isDerivTrade = action.type === 'deriv_trade';
  const isDerivClose = action.type === 'deriv_close';
  const isMT5 = action.type === 'mt5_trade';
  const isWatch = action.type === 'watch_market';

  const typeLabel = isDerivTrade ? '🎯 Deriv Trade' : isMT5 ? '📈 MT5 Trade' : isDerivClose ? '🔴 Close Contract' : '👁 Watch Market';
  const typeClass = (isDerivTrade||isDerivClose||isWatch) ? 'deriv' : 'mt5';

  // header
  card.innerHTML = `
    <div class="ac-header">
      <span class="ac-type ${typeClass}">${typeLabel}</span>
      <span class="ac-badge pending" id="badge_${action.id}">Pending authorization</span>
    </div>`;

  // detail rows
  const rows = document.createElement('div');
  rows.className = 'ac-rows';
  const d = action.details || {};
  const fields = isDerivTrade ? [
    ['Account', action.account || 'Account 1'],
    ['Contract', d.contract_type || '—'],
    ['Symbol', d.symbol || '—'],
    ['Duration', d.duration ? `${d.duration} ${d.duration_unit==='t'?'ticks':d.duration_unit==='s'?'seconds':'minutes'}` : '—'],
    ['Stake', d.stake ? `$${d.stake}` : '—'],
    ['Barrier', d.barrier || '—'],
  ] : isMT5 ? [
    ['Action', d.action || 'open'],
    ['Symbol', d.symbol || '—'],
    ['Direction', (d.type||'').toUpperCase()],
    ['Volume', d.volume ? `${d.volume} lots` : '—'],
    ['Stop Loss', d.sl || 'None'],
    ['Take Profit', d.tp || 'None'],
  ] : isDerivClose ? [
    ['Account', action.account || 'Account 1'],
    ['Contract ID', d.contract_id || '—'],
    ['Price', d.price || 'Market'],
  ] : [
    ['Symbol', d.symbol || '—'],
  ];

  fields.forEach(([k,v])=>{
    const row = document.createElement('div');
    row.className = 'ac-row';
    row.innerHTML = `<label>${k}</label><span id="val_${action.id}_${k.replace(/\s/g,'_')}">${v}</span>`;
    rows.appendChild(row);
  });
  card.appendChild(rows);

  // edit area
  const editArea = document.createElement('div');
  editArea.className = 'ac-edit-area';
  editArea.id = 'edit_'+action.id;
  const editableFields = isDerivTrade ? ['stake','barrier','duration','symbol'] : isMT5 ? ['volume','sl','tp'] : [];
  editableFields.forEach(key=>{
    const row = document.createElement('div');
    row.className = 'ac-edit-row';
    row.innerHTML = `<label>${key}</label><input id="ei_${action.id}_${key}" value="${d[key]||''}">`;
    editArea.appendChild(row);
  });
  if(editableFields.length) card.appendChild(editArea);

  // buttons
  const btns = document.createElement('div');
  btns.className = 'ac-actions';
  btns.innerHTML = `
    <button class="ac-btn reject" onclick="rejectAction('${action.id}')">Reject</button>
    ${editableFields.length ? `<button class="ac-btn edit" onclick="toggleEdit('${action.id}','${editableFields.join(',')}')">Edit</button>` : ''}
    <button class="ac-btn confirm" id="confirm_${action.id}" onclick="confirmAction('${action.id}','${editableFields.join(',')}')">✓ Confirm</button>
  `;
  card.appendChild(btns);
  return card;
}

function toggleEdit(id, fieldsStr){
  const area = el('edit_'+id);
  area.classList.toggle('open');
}

async function confirmAction(id, fieldsStr){
  const edits = {};
  if(fieldsStr){
    fieldsStr.split(',').filter(Boolean).forEach(key=>{
      const inp = el(`ei_${id}_${key}`);
      if(inp && inp.value !== ''){
        const v = isNaN(inp.value) ? inp.value : Number(inp.value);
        edits[key] = v;
      }
    });
  }
  el('confirm_'+id).disabled = true;
  el('confirm_'+id).textContent = 'Executing…';
  try{
    const res = await fetch('/api/action/confirm',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id,edits:Object.keys(edits).length?edits:undefined})}).then(r=>r.json());
    if(res.error){ alert('Error: '+res.error); el('confirm_'+id).disabled=false; el('confirm_'+id).textContent='✓ Confirm'; return; }
    el('badge_'+id).textContent = 'Executed ✓';
    el('badge_'+id).className = 'ac-badge confirmed';
    el('edit_'+id)?.classList.remove('open');
    // remove buttons
    const btnsEl = el('card_'+id).querySelector('.ac-actions');
    if(btnsEl) btnsEl.remove();
    appendMessage('assistant', formatResult(res.result));
  } catch(e){ alert('Error: '+e.message); el('confirm_'+id).disabled=false; el('confirm_'+id).textContent='✓ Confirm'; }
}

async function rejectAction(id){
  await fetch('/api/action/reject',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id})});
  el('badge_'+id).textContent = 'Rejected';
  el('badge_'+id).className = 'ac-badge rejected';
  const btnsEl = el('card_'+id)?.querySelector('.ac-actions');
  if(btnsEl) btnsEl.remove();
}

function formatResult(result){
  if(!result) return 'Done.';
  if(result.contract_id) return `Contract opened. ID: ${result.contract_id} | Payout: $${Number(result.payout||0).toFixed(2)}`;
  if(result.queued) return `MT5 order queued — ID: ${result.queued}. EA will execute on next poll.`;
  if(result.watching) return `Now watching ${result.watching}. Live prices flowing in.`;
  return JSON.stringify(result);
}

// ── memory ────────────────────────────────────────────────────────────────
async function exportMemory(){
  const data = await fetch('/api/memory/export').then(r=>r.blob());
  const url = URL.createObjectURL(data);
  const a = document.createElement('a'); a.href=url; a.download='secretary-memory.json'; a.click();
}

async function importMemory(input){
  const file = input.files[0]; if(!file) return;
  const text = await file.text();
  await fetch('/api/memory/import',{method:'POST',headers:{'Content-Type':'application/json'},body:text});
  alert('Memory imported. Reload to apply.');
}

async function clearMemory(){
  if(!confirm('Clear conversation history? Your preferences and strategies stay.')) return;
  await fetch('/api/memory/clear',{method:'POST'});
  chatArea.innerHTML='';
  appendMessage('assistant','Conversation history cleared. I still remember your preferences and strategies.');
}

// ── SSE stream ────────────────────────────────────────────────────────────
function connectStream(){
  const es = new EventSource('/api/stream');
  es.onmessage = e => {
    const d = JSON.parse(e.data);
    if(d._log) return; // ignore server logs in chat
    if(d.type==='tick') updateTickUI_partial(d.payload);
    if(d.type==='balance') updateBalanceLive(d.payload);
    if(d.type==='trade_settled') appendMessage('assistant', `Trade settled — ${d.payload.won?'WIN ✓':'LOSS ✗'} | Profit: $${Number(d.payload.profit).toFixed(2)} | Contract: ${d.payload.contract_id}`);
    if(d.type==='mt5_result') appendMessage('assistant', `MT5: ${d.payload.success?'Order executed ✓':'Order failed ✗'} — ${d.payload.message}`);
    if(d.type==='action_executed') refreshStatus();
  };
  es.onerror = () => { es.close(); setTimeout(connectStream, 3000); };
}

function updateTickUI_partial(p){
  if(p.price) el('mwPrice').textContent = Number(p.price).toFixed(4);
}

function updateBalanceLive(p){
  if(p.account==='Account 1') el('a1balance').textContent = `${p.currency} ${Number(p.balance).toFixed(2)}`;
  if(p.account==='Account 2') el('a2balance').textContent = `${p.currency} ${Number(p.balance).toFixed(2)}`;
}

// ── load history ──────────────────────────────────────────────────────────
async function loadHistory(){
  try{
    const mem = await fetch('/api/memory').then(r=>r.json());
    const hist = (mem.conversation_history||[]).slice(-20);
    for(let i=0;i<hist.length;i++){
      const m = hist[i];
      if(m.role==='user') appendMessage('user', m.content);
      else if(m.role==='assistant') appendMessage('assistant', m.content);
    }
    if(!hist.length){
      appendMessage('assistant','I\'m ready. You can:\n• Ask me to analyze a market\n• Tell me to open a trade on Deriv or MT5\n• Ask me anything about your strategy\n• Say "watch Volatility 100 1s" and I\'ll start monitoring live prices\n\nConnect your accounts on the left to get started.');
    }
  } catch {}
}

// ── init ──────────────────────────────────────────────────────────────────
(async function init(){
  await loadHistory();
  await refreshStatus();
  connectStream();
  setInterval(refreshStatus, 10000);
})();
</script>
