<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zone Touch 10-in-1 v2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{background:#060910;color:#C8D0DC;font-family:'JetBrains Mono',monospace;font-size:13px;}
.app{display:flex;height:100vh;overflow:hidden;}

/* sidebar */
.sidebar{width:244px;min-width:244px;background:#07090E;border-right:1px solid #111827;display:flex;flex-direction:column;overflow:hidden;}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}

.logo{padding:15px 14px;border-bottom:1px solid #111827;display:flex;align-items:center;gap:10px;}
.logo-orb{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,#A78BFA,#EC4899);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;box-shadow:0 0 14px rgba(167,139,250,.3);}
.logo-name{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:15px;color:#E8EDF3;}
.logo-tag{margin-left:auto;font-size:10px;background:#111827;color:#3C4A5C;padding:2px 7px;border-radius:5px;font-family:'Space Grotesk',sans-serif;border:1px solid #1A2535;}

.acct{padding:12px 14px;border-bottom:1px solid #111827;}
.arow{display:flex;align-items:center;gap:8px;margin-bottom:3px;}
.adot{width:8px;height:8px;border-radius:50%;background:#1E2A38;transition:all .3s;}
.adot.on{background:#22C55E;box-shadow:0 0 7px #22C55E;}
.alabel{font-size:11px;color:#6B7A8D;font-family:'Space Grotesk',sans-serif;font-weight:500;}
.abal{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:17px;color:#E8EDF3;margin:3px 0 1px 16px;min-height:22px;}
.aid{font-size:10px;color:#2C3A4A;margin:0 0 9px 16px;min-height:13px;}
.tinp{width:100%;background:#0C1220;border:1px solid #192030;color:#C8D0DC;font-family:'JetBrains Mono',monospace;font-size:12px;padding:8px 10px;border-radius:7px;margin-bottom:6px;outline:none;}
.tinp:focus{border-color:#A78BFA;}
.bcn{width:100%;background:#A78BFA;color:#0D0520;border:none;border-radius:7px;padding:9px;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:13px;cursor:pointer;}
.bcn:disabled{opacity:.4;cursor:not-allowed;}

.slist{flex:1;overflow-y:auto;padding:6px;}
.si{display:flex;align-items:center;padding:9px 10px;border-radius:9px;cursor:pointer;margin-bottom:2px;gap:8px;border:1px solid transparent;transition:background .12s,border-color .12s;}
.si:hover{background:#0C1220;}
.si.active{background:#0C1220;border-color:#192030;}
.si-num{width:22px;height:22px;border-radius:7px;background:#111827;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;font-family:'Space Grotesk',sans-serif;color:#4B5A6C;flex-shrink:0;}
.si-num.on{background:rgba(167,139,250,.15);color:#A78BFA;}
.si-meta{flex:1;min-width:0;}
.si-sym{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:12px;color:#D4DAE4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.si-sub{font-size:10px;color:#2C3A4A;margin-top:2px;}
.si-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px;}
.sdot{width:7px;height:7px;border-radius:50%;background:#1E2A38;}
.sdot.on{background:#22C55E;box-shadow:0 0 5px #22C55E;animation:glow 1.8s ease-in-out infinite;}
@keyframes glow{0%,100%{opacity:1;}50%{opacity:.3;}}
.spl{font-size:10px;font-weight:600;font-family:'Space Grotesk',sans-serif;}
.cg{color:#22C55E;}.cr{color:#EF4444;}.cm{color:#2C3A4A;}

.sfoot{padding:10px 12px;border-top:1px solid #111827;}
.bstopall{width:100%;background:transparent;color:#EF4444;border:1px solid #2A1515;border-radius:7px;padding:8px;font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:12px;cursor:pointer;}
.bstopall:hover{background:#150808;}

/* welcome */
.welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
.wicon{font-size:56px;opacity:.2;}
.wtitle{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:20px;color:#1E2A38;}
.wsub{color:#151D28;font-size:13px;}

/* dashboard */
.dash{display:flex;flex-direction:column;flex:1;overflow:hidden;}

.mhdr{padding:13px 22px;border-bottom:1px solid #111827;display:flex;align-items:center;gap:12px;flex-shrink:0;background:#07090E;}
.mhdr-num{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:14px;flex-shrink:0;}
.mhdr-info{flex:1;min-width:0;}
.mhdr-name{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:18px;color:#E8EDF3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mhdr-meta{font-size:11px;color:#4B5A6C;margin-top:2px;}
.sbadge{font-size:11px;padding:4px 12px;border-radius:20px;font-family:'Space Grotesk',sans-serif;font-weight:600;white-space:nowrap;}
.sbadge.run{background:rgba(34,197,94,.1);color:#22C55E;border:1px solid rgba(34,197,94,.22);}
.sbadge.stp{background:rgba(30,42,56,.4);color:#3C4A5C;border:1px solid #192030;}
.sbadge.trd{background:rgba(167,139,250,.1);color:#A78BFA;border:1px solid rgba(167,139,250,.22);}
.sbadge.con{background:rgba(251,146,60,.1);color:#FB923C;border:1px solid rgba(251,146,60,.22);}
.hbtns{display:flex;gap:8px;flex-shrink:0;}
.bstart{background:#A78BFA;color:#0D0520;border:none;border-radius:8px;padding:9px 20px;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:13px;cursor:pointer;}
.bstart:disabled{opacity:.4;cursor:not-allowed;}
.bstopbot{background:transparent;color:#EF4444;border:1px solid #EF4444;border-radius:8px;padding:9px 20px;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:13px;cursor:pointer;}
.bstopbot:disabled{opacity:.4;cursor:not-allowed;}

.sbar{display:grid;grid-template-columns:repeat(5,1fr);flex-shrink:0;border-bottom:1px solid #111827;}
.sc{padding:12px 16px;border-right:1px solid #111827;background:#07090E;}
.sc:last-child{border-right:none;}
.sl{font-size:10px;color:#2C3A4A;text-transform:uppercase;letter-spacing:1px;font-family:'Space Grotesk',sans-serif;margin-bottom:4px;}
.sv{font-size:22px;font-weight:700;color:#E8EDF3;font-family:'Space Grotesk',sans-serif;letter-spacing:-.5px;}
.sv.g{color:#22C55E;}.sv.r{color:#EF4444;}

.cgrid{flex:1;overflow:hidden;display:grid;grid-template-columns:300px 1fr;grid-template-rows:1fr 190px;}

/* settings */
.setp{grid-column:1;grid-row:1;border-right:1px solid #111827;overflow-y:auto;padding:14px 16px;background:#07090E;}
.ph{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:1.3px;color:#2C3A4A;margin-bottom:11px;}
.f{margin-bottom:10px;}
.f label{display:block;font-size:11px;color:#4B5A6C;margin-bottom:4px;font-family:'Space Grotesk',sans-serif;}
.f input,.f select{width:100%;background:#0C1220;border:1px solid #192030;color:#C8D0DC;font-family:'JetBrains Mono',monospace;font-size:13px;padding:8px 10px;border-radius:7px;outline:none;}
.f input:focus,.f select:focus{border-color:#A78BFA;}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.f3{display:grid;grid-template-columns:1fr 80px;gap:6px;}
.divider{height:1px;background:#111827;margin:12px 0;}
.bsave{width:100%;background:#A78BFA;color:#0D0520;border:none;border-radius:8px;padding:10px;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:13px;cursor:pointer;margin-top:6px;}
.smsg{text-align:center;font-size:11px;color:#A78BFA;margin-top:6px;height:15px;transition:opacity .3s;}

/* logic pills */
.logic-pills{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;margin-bottom:10px;}
.lp{padding:8px 4px;background:#0C1220;border:1px solid #192030;color:#4B5A6C;border-radius:7px;cursor:pointer;font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:11px;text-align:center;transition:all .15s;line-height:1.3;}
.lp.on{background:rgba(167,139,250,.1);color:#A78BFA;border-color:#A78BFA;}
.lp-desc{font-size:9px;color:#2C3A4A;margin-top:3px;font-weight:400;}

/* observe mode pills */
.mode-pills{display:grid;grid-template-columns:1fr 1fr;gap:4px;}
.mp{padding:8px;background:#0C1220;border:1px solid #192030;color:#4B5A6C;border-radius:7px;cursor:pointer;font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:12px;text-align:center;transition:all .15s;}
.mp.on{background:rgba(167,139,250,.1);color:#A78BFA;border-color:#A78BFA;}

/* log */
.logp{grid-column:2;grid-row:1;overflow:hidden;display:flex;flex-direction:column;padding:14px 16px;}
.logbox{flex:1;overflow-y:auto;font-size:12px;line-height:1.7;}
.le{color:#2C3A4A;white-space:pre-wrap;word-break:break-word;}
.le .ts{color:#1A2535;margin-right:6px;}
.le.ok{color:#C8D0DC;}.le.win{color:#22C55E;}.le.loss{color:#EF4444;}.le.err{color:#FB923C;}

/* history */
.histp{grid-column:1/-1;grid-row:2;border-top:1px solid #111827;overflow-y:auto;background:#07090E;}
.histhdr{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:1.3px;color:#2C3A4A;padding:10px 18px 8px;position:sticky;top:0;background:#07090E;border-bottom:1px solid #0E1520;z-index:1;}
table{width:100%;border-collapse:collapse;}
th{font-size:10px;color:#2C3A4A;font-weight:500;text-align:left;padding:7px 14px;text-transform:uppercase;letter-spacing:.8px;}
td{padding:7px 14px;border-top:1px solid #0C1220;font-size:12px;color:#6B7A8D;}
.tw{color:#22C55E;font-weight:600;}.tl{color:#EF4444;font-weight:600;}
.emp{padding:20px 18px;color:#1A2535;font-size:12px;}

::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#192030;border-radius:3px;}

.field-hidden{display:none;}
</style>
</head>
<body>
<div class="app">

<aside class="sidebar">
  <div class="logo">
    <div class="logo-orb">🎯</div>
    <span class="logo-name">Zone Touch</span>
    <span class="logo-tag">10-in-1</span>
  </div>
  <div class="acct">
    <div class="arow"><div class="adot" id="adot"></div><span class="alabel" id="alabel">Not connected</span></div>
    <div class="abal" id="abal"></div>
    <div class="aid"  id="aid"></div>
    <input type="password" class="tinp" id="tinp" placeholder="Paste API token…">
    <button class="bcn" id="bcn" onclick="connectAccount()">Connect</button>
  </div>
  <div class="slist" id="slist"></div>
  <div class="sfoot"><button class="bstopall" onclick="stopAll()">■ Stop All Markets</button></div>
</aside>

<main class="main" id="main">
  <div class="welcome">
    <div class="wicon">🎯</div>
    <div class="wtitle">Zone Touch 10-in-1</div>
    <div class="wsub">Select a market from the sidebar</div>
  </div>
</main>

</div>
<script>
let current = null, syms = [], state = {};
const COLORS = ['#A78BFA','#22C55E','#3B82F6','#F59E0B','#EC4899','#06B6D4','#84CC16','#FB923C','#EF4444','#8B5CF6'];
const LOGIC_LABELS = ['Zone Touch','Reversal Touch','Reversal Any'];

// account
function setAcct(info){
  document.getElementById('adot').className = 'adot' + (info.ready ? ' on' : '');
  document.getElementById('alabel').textContent = info.ready ? (info.loginid || 'Connected') : 'Not connected';
  document.getElementById('abal').textContent = info.ready && info.balance != null ? `${info.currency} ${Number(info.balance).toFixed(2)}` : '';
  document.getElementById('aid').textContent = info.loginid || '';
}

async function connectAccount(){
  const t = document.getElementById('tinp').value.trim(); if (!t) return;
  const btn = document.getElementById('bcn'); btn.disabled = true; btn.textContent = 'Connecting…';
  try {
    const r = await post('/api/token', { token: t });
    document.getElementById('tinp').value = '';
    if (r.error) { alert(r.error); return; }
    setAcct(r);
  } finally { btn.disabled = false; btn.textContent = 'Connect'; }
}

// sidebar
function renderSidebar(slotsData){
  const list = document.getElementById('slist'); list.innerHTML = '';
  slotsData.forEach((s, i) => {
    state[s.id] = { running: s.running, busy: s.busy, stats: s.stats, settings: s.settings, phase: s.phase };
    const pl = s.stats.profit, wr = s.stats.trades ? Math.round(s.stats.wins/s.stats.trades*100) : 0;
    const plT = pl !== 0 ? (pl>0?'+':'')+'$'+Math.abs(pl).toFixed(2) : '';
    const plC = pl>0?'cg':pl<0?'cr':'cm';
    const sym = s.settings?.symbol || '—';
    const logic = s.settings?.logic || 1;
    const el = document.createElement('div');
    el.className = 'si' + (current === s.id ? ' active' : '');
    el.id = 'si_' + s.id;
    el.onclick = () => selectSlot(s.id);
    el.innerHTML = `
      <div class="si-num${s.running?' on':''}">${i+1}</div>
      <div class="si-meta">
        <div class="si-sym">${sym}</div>
        <div class="si-sub">L${logic} &middot; ${s.stats.trades} trades &middot; ${wr}% WR</div>
      </div>
      <div class="si-right">
        <div class="sdot${s.running?' on':''}"></div>
        <div class="spl ${plC}">${plT}</div>
      </div>`;
    list.appendChild(el);
  });
}

function patchSidebar(slotId){
  const s = state[slotId]; if (!s) return;
  const el = document.getElementById('si_'+slotId); if (!el) return;
  const pl = s.stats.profit, wr = s.stats.trades ? Math.round(s.stats.wins/s.stats.trades*100) : 0;
  const plT = pl!==0?(pl>0?'+':'')+'$'+Math.abs(pl).toFixed(2):'';
  el.querySelector('.si-num').className = 'si-num'+(s.running?' on':'');
  el.querySelector('.sdot').className = 'sdot'+(s.running?' on':'');
  el.querySelector('.si-sub').textContent = `L${s.settings?.logic||1} · ${s.stats.trades} trades · ${wr}% WR`;
  const p = el.querySelector('.spl'); p.textContent = plT; p.className = 'spl '+(pl>0?'cg':pl<0?'cr':'cm');
}

// select slot
async function selectSlot(id){
  current = id;
  document.querySelectorAll('.si').forEach(e => e.classList.remove('active'));
  const si = document.getElementById('si_'+id); if (si) si.classList.add('active');
  const idx = parseInt(id.replace('slot',''));
  const [slot, logs, history] = await Promise.all([get(`/api/slot/${id}`), get(`/api/slot/${id}/logs`), get(`/api/slot/${id}/history`)]);
  state[id] = { running: slot.running, busy: slot.busy, stats: slot.stats, settings: slot.settings, phase: slot.phase };
  renderDash(id, idx, slot, logs, history);
}

// dashboard
function renderDash(id, idx, slot, logs, history){
  const s = slot.stats, set = slot.settings;
  const wr = s.trades?(s.wins/s.trades*100).toFixed(1):'0.0';
  const pl = s.profit, plT = (pl>=0?'+':'')+'$'+Math.abs(pl).toFixed(2), plC = pl>0?'g':pl<0?'r':'';
  const color = COLORS[idx]||'#A78BFA';
  const sOpts = syms.map(x=>`<option value="${x.symbol}"${x.symbol===set.symbol?' selected':''}>${x.display_name}</option>`).join('');
  const badge = badgeHTML(slot.running, slot.busy, slot.phase);

  document.getElementById('main').innerHTML = `
<div class="dash">

  <div class="mhdr" style="border-bottom-color:${color}22">
    <div class="mhdr-num" style="background:${color}1A;border:1px solid ${color}40;color:${color}">${idx+1}</div>
    <div class="mhdr-info">
      <div class="mhdr-name" id="mName">${set.symbol}</div>
      <div class="mhdr-meta" id="mMeta">Logic ${set.logic}: ${LOGIC_LABELS[set.logic-1]} · ${set.observe_mode==='candles'?'M1 Candles':'Ticks'}</div>
    </div>
    <span id="sbadge">${badge}</span>
    <div class="hbtns">
      <button class="bstart" id="startBtn" onclick="startSlot()" style="background:${color}" ${slot.running?'disabled':''}>▶ Start</button>
      <button class="bstopbot" id="stopBtn" onclick="stopSlot()" ${!slot.running?'disabled':''}>■ Stop</button>
    </div>
  </div>

  <div class="sbar">
    <div class="sc"><div class="sl">Trades</div><div class="sv" id="sT">${s.trades}</div></div>
    <div class="sc"><div class="sl">Wins</div><div class="sv g" id="sW">${s.wins}</div></div>
    <div class="sc"><div class="sl">Losses</div><div class="sv r" id="sL">${s.losses}</div></div>
    <div class="sc"><div class="sl">Win Rate</div><div class="sv" id="sWR">${wr}%</div></div>
    <div class="sc"><div class="sl">Total P / L</div><div class="sv ${plC}" id="sPL">${plT}</div></div>
  </div>

  <div class="cgrid">
    <div class="setp">
      <div class="ph">Trading Logic</div>
      <div class="logic-pills">
        ${[1,2,3].map(n=>`<div class="lp${set.logic===n?' on':''}" onclick="pickLogic(${n})"><div>Logic ${n}</div><div class="lp-desc">${LOGIC_LABELS[n-1]}</div></div>`).join('')}
      </div>

      <div class="divider"></div>
      <div class="ph">Market &amp; Observation</div>

      <div class="f">
        <label>Market</label>
        <select id="fSym" onchange="updateMeta()">${sOpts||`<option value="${set.symbol}">${set.symbol}</option>`}</select>
      </div>

      <div class="f">
        <label>Observe Mode</label>
        <div class="mode-pills">
          <div class="mp${set.observe_mode==='ticks'?' on':''}" onclick="pickMode('ticks')">Ticks</div>
          <div class="mp${set.observe_mode==='candles'?' on':''}" onclick="pickMode('candles')">M1 Candles</div>
        </div>
      </div>

      <div class="f2">
        <div class="f" style="margin-bottom:0">
          <label id="obsLabel">${set.observe_mode==='candles'?'Candles to Observe':'Ticks to Observe'}</label>
          <input type="number" id="fObs" value="${set.observe_count}" min="2">
        </div>
        <div class="f" style="margin-bottom:0">
          <label>Reaction Range</label>
          <input type="number" id="fRR" value="${set.reaction_range}" step="0.01" min="0.01">
        </div>
      </div>

      <div class="f" style="margin-top:10px">
        <label id="confLabel">${set.observe_mode==='candles'?'Confirmation Candles':'Confirmation Ticks'} back</label>
        <input type="number" id="fConf" value="${set.confirm_count}" min="1">
      </div>

      <div class="divider"></div>
      <div class="ph">Trade Settings</div>

      <div class="f">
        <label>Stake (USD)</label>
        <input type="number" id="fStake" value="${set.stake}" step="0.01" min="0.35">
      </div>

      <div class="f">
        <label>Duration</label>
        <div class="f3">
          <input type="number" id="fDV" value="${set.duration_value}" min="1">
          <select id="fDU">
            <option value="t" ${set.duration_unit==='t'?'selected':''}>Ticks</option>
            <option value="s" ${set.duration_unit==='s'?'selected':''}>Seconds</option>
            <option value="m" ${set.duration_unit==='m'?'selected':''}>Minutes</option>
          </select>
        </div>
      </div>

      <div class="f2">
        <div class="f" style="margin-bottom:0">
          <label id="b1label">${set.logic===1?'Barrier 1 (upper)':set.logic===2?'Barrier at HIGH':'Barrier at HIGH'}</label>
          <input type="text" id="fB1" value="${set.barrier1}">
        </div>
        <div class="f" style="margin-bottom:0">
          <label id="b2label">${set.logic===1?'Barrier 2 (lower)':set.logic===2?'Barrier at LOW':'Barrier at LOW'}</label>
          <input type="text" id="fB2" value="${set.barrier2}">
        </div>
      </div>

      <div class="f" id="ctField" style="margin-top:10px;${set.logic!==3?'display:none':''}">
        <label>Contract Type</label>
        <select id="fCT">
          <option value="CALL" ${set.contract_type==='CALL'?'selected':''}>Rise</option>
          <option value="PUT" ${set.contract_type==='PUT'?'selected':''}>Fall</option>
          <option value="CALL" ${set.contract_type==='CALL'?'selected':''}>Higher</option>
          <option value="PUT" ${set.contract_type==='PUT'?'selected':''}>Lower</option>
          <option value="ONETOUCH" ${set.contract_type==='ONETOUCH'?'selected':''}>One Touch</option>
          <option value="NOTOUCH" ${set.contract_type==='NOTOUCH'?'selected':''}>No Touch</option>
        </select>
      </div>

      <div class="f" style="margin-top:10px">
        <label>Rest After Trade (seconds)</label>
        <input type="number" id="fRest" value="${set.rest_seconds}" min="0">
      </div>

      <button class="bsave" onclick="saveSettings()" style="background:${color}">Save Settings</button>
      <div class="smsg" id="smsg" style="opacity:0;color:${color}"></div>
    </div>

    <div class="logp">
      <div class="ph">Live Log</div>
      <div class="logbox" id="logBox">${logs.slice(-150).map(leHTML).join('')}</div>
    </div>

    <div class="histp">
      <div class="histhdr">Trade History</div>
      <div id="histWrap">
        ${history.length
          ?`<table><thead><tr><th>Time</th><th>Symbol</th><th>Contract</th><th>Barrier</th><th>Stake</th><th>Result</th><th>P/L</th></tr></thead><tbody id="histBody">${history.map(hrHTML).join('')}</tbody></table>`
          :`<div class="emp">No trades yet</div>`}
      </div>
    </div>
  </div>
</div>`;

  const lb = document.getElementById('logBox'); if (lb) lb.scrollTop = lb.scrollHeight;
}

function badgeHTML(running, busy, phase){
  if (!running) return `<span class="sbadge stp">Stopped</span>`;
  if (busy || phase === 'trading') return `<span class="sbadge trd">● In Trade</span>`;
  if (phase === 'confirming') return `<span class="sbadge con">● Confirming</span>`;
  return `<span class="sbadge run">● Watching</span>`;
}

// logic / mode pickers (no save needed, just visual + temp state)
let tempLogic = null, tempMode = null;

function pickLogic(n){
  tempLogic = n;
  document.querySelectorAll('.lp').forEach((e,i)=>e.classList.toggle('on',i===n-1));
  // show/hide contract type field
  const ctf = document.getElementById('ctField');
  if (ctf) ctf.style.display = n===3 ? '' : 'none';
  // update barrier labels
  const b1 = document.getElementById('b1label'), b2 = document.getElementById('b2label');
  if (b1) b1.textContent = n===1 ? 'Barrier 1 (upper)' : 'Barrier at HIGH';
  if (b2) b2.textContent = n===1 ? 'Barrier 2 (lower)' : 'Barrier at LOW';
}

function pickMode(mode){
  tempMode = mode;
  document.querySelectorAll('.mp').forEach((e,i)=>e.classList.toggle('on',(i===0&&mode==='ticks')||(i===1&&mode==='candles')));
  const ol = document.getElementById('obsLabel'); if (ol) ol.textContent = mode==='candles'?'Candles to Observe':'Ticks to Observe';
  const cl = document.getElementById('confLabel'); if (cl) cl.textContent = (mode==='candles'?'Confirmation Candles':'Confirmation Ticks')+' back';
  updateMeta();
}

function updateMeta(){
  const sym = document.getElementById('fSym')?.value || '';
  const mode = tempMode || state[current]?.settings?.observe_mode || 'ticks';
  const logic = tempLogic || state[current]?.settings?.logic || 1;
  const mName = document.getElementById('mName'); if (mName) mName.textContent = sym;
  const mMeta = document.getElementById('mMeta'); if (mMeta) mMeta.textContent = `Logic ${logic}: ${LOGIC_LABELS[logic-1]} · ${mode==='candles'?'M1 Candles':'Ticks'}`;
  if (sym && current) {
    const el = document.getElementById('si_'+current); if (el) { const se = el.querySelector('.si-sym'); if (se) se.textContent = sym; }
  }
}

// save
async function saveSettings(){
  if (!current) return;
  const v = id => { const e = document.getElementById(id); return e ? e.value : null; };
  const s = {
    symbol:         v('fSym'),
    logic:          tempLogic || state[current]?.settings?.logic || 1,
    observe_mode:   tempMode  || state[current]?.settings?.observe_mode || 'ticks',
    observe_count:  Number(v('fObs')),
    reaction_range: parseFloat(v('fRR')||0.3),
    confirm_count:  Number(v('fConf')||1),
    stake:          Number(v('fStake')),
    duration_value: Number(v('fDV')),
    duration_unit:  v('fDU')||'t',
    barrier1:       (v('fB1')||'').trim(),
    barrier2:       (v('fB2')||'').trim(),
    contract_type:  v('fCT') || 'ONETOUCH',
    rest_seconds:   Number(v('fRest')),
  };
  await post(`/api/slot/${current}/settings`, s);
  if (state[current]) state[current].settings = { ...state[current].settings, ...s };
  tempLogic = null; tempMode = null;
  const el = document.getElementById('si_'+current);
  if (el) { const se = el.querySelector('.si-sub'); if (se) se.textContent = `L${s.logic} · ${state[current].stats.trades} trades · 0% WR`; }
  const m = document.getElementById('smsg');
  if (m) { m.textContent = 'Saved ✓'; m.style.opacity = '1'; setTimeout(()=>m.style.opacity='0',2000); }
}

async function startSlot(){
  if (!current) return;
  const btn = document.getElementById('startBtn'); if (btn){btn.disabled=true;btn.textContent='Starting…';}
  const r = await post(`/api/slot/${current}/start`);
  if (r.error){ alert(r.error); if(btn){btn.disabled=false;btn.textContent='▶ Start';} }
}
async function stopSlot(){ if(!current)return; await post(`/api/slot/${current}/stop`); }
async function stopAll(){ if(!confirm('Stop all running markets?'))return; await post('/api/stopall'); }

// log helpers
function leHTML(e){
  const ts=new Date(e.time).toLocaleTimeString();
  const c=e.level==='win'?'win':e.level==='loss'?'loss':e.level==='err'?'err':e.level==='ok'?'ok':'';
  return `<div class="le ${c}"><span class="ts">${ts}</span>${esc(e.msg)}</div>`;
}
function hrHTML(h){
  const ts=new Date(h.time).toLocaleTimeString(), p=Number(h.profit);
  return `<tr><td>${ts}</td><td>${h.symbol}</td><td>${h.type}</td><td>${h.barrier||'—'}</td><td>$${Number(h.stake).toFixed(2)}</td><td class="${h.won?'tw':'tl'}">${h.won?'WIN':'LOSS'}</td><td class="${p>=0?'tw':'tl'}">${p>=0?'+':''}$${Math.abs(p).toFixed(2)}</td></tr>`;
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function appendLog(e){
  const lb=document.getElementById('logBox');if(!lb)return;
  const d=document.createElement('div');d.innerHTML=leHTML(e);
  lb.appendChild(d.firstChild);lb.scrollTop=lb.scrollHeight;
}
function prependHist(h){
  let body=document.getElementById('histBody');
  if(!body){
    document.getElementById('histWrap').innerHTML=`<table><thead><tr><th>Time</th><th>Symbol</th><th>Contract</th><th>Barrier</th><th>Stake</th><th>Result</th><th>P/L</th></tr></thead><tbody id="histBody">${hrHTML(h)}</tbody></table>`;
    return;
  }
  const t=document.createElement('tbody');t.innerHTML=hrHTML(h);body.insertBefore(t.firstChild,body.firstChild);
}

function updateStats(stats,running,busy,phase){
  if(!stats)return;
  const wr=stats.trades?(stats.wins/stats.trades*100).toFixed(1):'0.0';
  const pl=stats.profit,plT=(pl>=0?'+':'')+'$'+Math.abs(pl).toFixed(2),plC=pl>0?'g':pl<0?'r':'';
  setText('sT',stats.trades);setText('sW',stats.wins);setText('sL',stats.losses);setText('sWR',wr+'%');
  const pe=document.getElementById('sPL');if(pe){pe.textContent=plT;pe.className='sv '+plC;}
  if(running!==undefined){
    const b=document.getElementById('sbadge');if(b)b.innerHTML=badgeHTML(running,busy,phase);
    const sb=document.getElementById('startBtn');if(sb)sb.disabled=running;
    const ss=document.getElementById('stopBtn');if(ss)ss.disabled=!running;
  }
}
function setText(id,v){const e=document.getElementById(id);if(e)e.textContent=v;}

// SSE
function connectSSE(){
  const es=new EventSource('/api/stream');
  es.onmessage=e=>{try{handleSSE(JSON.parse(e.data));}catch{}};
  es.onerror=()=>{es.close();setTimeout(connectSSE,3000);};
}
function handleSSE(d){
  switch(d.type){
    case 'init': setAcct(d.account); renderSidebar(d.slots); break;
    case 'account': setAcct(d.data); break;
    case 'state':
      if(!state[d.slotId])state[d.slotId]={};
      Object.assign(state[d.slotId],d.data);
      patchSidebar(d.slotId);
      if(d.slotId===current)updateStats(d.data.stats,d.data.running,d.data.busy,d.data.phase);
      break;
    case 'log': if(d.slotId===current)appendLog(d.entry); break;
    case 'trade':
      if(d.slotId===current){if(state[current])updateStats(state[current].stats);prependHist(d.data);}
      break;
  }
}

const get=url=>fetch(url).then(r=>r.json());
const post=(url,body)=>fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body||{})}).then(r=>r.json());

async function loadSymbols(){
  try{const d=await get('/api/symbols');if(Array.isArray(d))syms=d;}catch{}
}

(async function init(){
  await loadSymbols();
  connectSSE();
})();
</script>
